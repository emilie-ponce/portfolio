    <main>
        
        <div class="bigmail">
            
            <h2 class="contact">Contactez-moi</h2>
                
            <form action="mailto:emilie.ponce@laplateforme.io" method="post" enctype="text/plain">
                    
                <label class="mail" for="name">
                    NOM Prénom:
                </label><br>

                <input class="input" type="text" id="name" name="name" required><br><br>

                <label class="mail" for="email">
                    Email:
                </label><br>

                <input class="input" type="email" id="email" name="email" required><br><br>
                
                <label class="mail" for="message">
                    Message:
                </label><br>
                
                <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
                
                <input class="send" type="submit" value="Envoyer">
            </form>
        </div>
    </main>
